data:
  zip_path: shapes.zip
  extract_dir: data/shapes
  image_size: [200, 200]
  channels: 1
  test_size: 0.20
  val_size: 0.15
  random_state: 42
  batch_size: 32
  classes: [circle, square, star, triangle]

model:
  filters: [32, 64, 128, 256]
  dense_units: [256, 128]
  dropout_rate: 0.5
  use_batch_norm: true

training:
  epochs: 30
  learning_rate: 0.001
  early_stopping_patience: 7
  reduce_lr_patience: 3
  reduce_lr_factor: 0.5
  min_lr: 0.000001

output:
  model_dir: models
  logs_dir: logs
  plots_dir: plots
  model_name: shapenet.h5
